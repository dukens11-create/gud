plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def getSigningValue = { String propertyKey, List<String> envKeys ->
    def propertyValue = keystoreProperties.getProperty(propertyKey)
    if (propertyValue != null && !propertyValue.trim().isEmpty()) {
        return propertyValue
    }

    for (envKey in envKeys) {
        def envValue = System.getenv(envKey)
        if (envValue != null && !envValue.trim().isEmpty()) {
            return envValue
        }
    }

    return null
}

def signingStoreFilePath = getSigningValue('storeFile', ['ANDROID_KEYSTORE_PATH', 'CM_KEYSTORE_PATH', 'KEYSTORE_PATH'])
def signingStorePassword = getSigningValue('storePassword', ['ANDROID_KEYSTORE_PASSWORD', 'CM_KEYSTORE_PASSWORD', 'KEYSTORE_PASSWORD'])
def signingKeyAlias = getSigningValue('keyAlias', ['ANDROID_KEY_ALIAS', 'CM_KEY_ALIAS', 'KEY_ALIAS'])
def signingKeyPassword = getSigningValue('keyPassword', ['ANDROID_KEY_PASSWORD', 'CM_KEY_PASSWORD', 'KEY_PASSWORD'])
def hasReleaseSigningConfig = signingStoreFilePath && signingStorePassword && signingKeyAlias && signingKeyPassword
def allowDebugSigningForRelease = (project.findProperty('allowDebugSigningForRelease')
        ?: System.getenv('ALLOW_DEBUG_SIGNING_FOR_RELEASE')
        ?: 'false').toBoolean()

android {
    namespace "com.gudexpress.gud_app"
    compileSdk 36
    ndkVersion "28.2.13676358"

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.gudexpress.gud_app"
        minSdk 21
        targetSdk 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        
        // Enable split APKs by ABI for smaller download sizes
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    signingConfigs {
        release {
            if (hasReleaseSigningConfig) {
                keyAlias signingKeyAlias
                keyPassword signingKeyPassword
                storeFile file(signingStoreFilePath)
                storePassword signingStorePassword
            }
        }
    }

    buildTypes {
        debug {
            minifyEnabled false
            shrinkResources false
            debuggable true
        }
        
        profile {
            minifyEnabled false
            shrinkResources false
            debuggable false
            signingConfig signingConfigs.debug
        }
        
        release {
            signingConfig hasReleaseSigningConfig ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            debuggable false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    if (!hasReleaseSigningConfig && !allowDebugSigningForRelease) {
        gradle.taskGraph.whenReady { taskGraph ->
            if (taskGraph.hasTask(':app:bundleRelease') || taskGraph.hasTask(':app:assembleRelease')) {
                throw new GradleException(
                        "Release signing credentials are missing. Configure android/key.properties " +
                                "or set ANDROID_KEYSTORE_PATH, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD."
                )
            }
        }
    }
    
    // Configure splits for AAB optimization
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }

    packagingOptions {
        pickFirst 'lib/*/libc++_shared.so'
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/*.kotlin_module'
    }
}

configurations.all {
    resolutionStrategy {
        force 'androidx.core:core:1.15.0'
        force 'androidx.appcompat:appcompat:1.7.1'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-analytics'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.4'
}

// Apply Firebase plugin unconditionally
apply plugin: 'com.google.gms.google-services'

def googleServicesFile = file('google-services.json')
if (googleServicesFile.exists()) {
    println '✅ google-services.json found - Firebase enabled'
} else {
    println '⚠️ google-services.json not found - Firebase disabled'
}